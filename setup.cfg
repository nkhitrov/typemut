[flake8]
max-line-length = 100
max-cognitive-complexity = 25
max-cognitive-average-complexity = 10
max-local-variables = 15
max-module-members = 15
max-methods = 15
max-module-expressions = 25
max-function-expressions = 25
max-arguments = 6

select = WPS

extend-ignore =
    WPS305,
    WPS110,
    WPS111,
    WPS237,
    WPS226,
    WPS348,
    WPS220,
    WPS221,
    WPS222,
    WPS336,
    WPS358,
    WPS420,
    WPS432,
    WPS527,
    WPS430,
    WPS441,
    WPS504,
    WPS529,
    WPS602,
    WPS615,
    WPS410,
    WPS412,
    WPS407,
    WPS501,
    WPS338,
    WPS229,

per-file-ignores =
    src/typemut/reporting/html.py: WPS202,WPS210,WPS326,WPS232,WPS231,WPS462,WPS342
    src/typemut/cli.py: WPS201,WPS363,WPS213,WPS231,WPS210
    src/typemut/discovery.py: WPS202,WPS232,WPS231
    src/typemut/engine.py: WPS232,WPS231,WPS210
    src/typemut/imports.py: WPS232,WPS231
    src/typemut/registry.py: WPS232,WPS231
    src/typemut/parallel.py: WPS426,WPS231,WPS213
    src/typemut/operators/*.py: WPS232,WPS231,WPS223,WPS213
    src/typemut/operators/__init__.py: WPS201,WPS213
    src/typemut/reporting/terminal.py: WPS210,WPS213
